<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>입력 폼</title>
  </head>
  <body>
    <!-- form = 입력칸들을 담는 묶음 상자 -->
    <form action="">
      <label for="">
        이름:
        <input
          type="text"
          name=""
          id=""
          placeholder="이름 입력" />
      </label>
      <br />
      <hr />
      <label for="">
        나이:
        <input
          type="number"
          name=""
          id="" />
      </label>
      <br />
      <hr />
      <button type="submit">보내기</button>
    </form>
  </body>
</html>
