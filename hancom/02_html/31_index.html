<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul>
      <li></li>
      <li></li>
      <li></li>
    </ul>

    <div class="box"></div>
    <div class="card"></div>
    <div class="text"></div>

    <div id="top"></div>
    <div id="bottom"></div>
    <div id="middle"></div>

    <h1>안녕</h1>
    <span>하이</span>

    <!--
      태그>태그    : 태그 안에 자식 태그를 추가하여 생성한다.
      ex) ul>li = <ul><li></li></ul>
      
      태그*N      : N번 반복해서 생성한다.
      ex) li*3 = <li></li><li></li><li></li>
      
      .클래스명 : 입력한 클래스를 갖는 div 태그를 생성한다.
      ex) .box = <div class="box"></div>

      #id명 : 입력한 id를 갖는 div 태그를 생성한다.
      ex) #top = <div id="top"></div>

      태그{글자} : 태그 안에 내용을 입력한 상태로 생성한다.
      ex) h1{안녕하세요} = <h1>안녕하세요</h1>
      ex) span{하이} = <span>하이</span>

      태그[속성] : 태그 안에 속성을 입력한 상태로 생성한다.
      ex) a[href=https://www.google.com] = <a href="https://www.google.com"></a>
    -->
  </body>
</html>
