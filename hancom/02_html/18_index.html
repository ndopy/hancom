<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>class 이름표</title>
  </head>
  <body>
    <!-- class = 여러 요소가 함꼐 쓰는 이름표 (같은 값 여러 번 OK) -->
    <h1>책 목록</h1>
    <p class="book">러닝 리액트</p>
    <p class="book">HTML + CSS + 자바스크립트</p>
    <p class="book">혼자서도 쉽게 익힐 수 있는 자기주도 파이썬</p>
  </body>
</html>
