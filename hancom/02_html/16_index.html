<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>영상 넣기</title>
  </head>
  <body>
    <!-- iframe = 내 페이지 안에 다른 페이지를 작은 네모창으로 끼워 넣기 -->
    <!-- width, height = 창 크기 (가로, 세로) -->
    <!-- src = 보여줄 영상 embed 주소 -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/oCtyRCnPQXY?si=Tfuqhr3KzjRBgGxc"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen></iframe>
  </body>
</html>
