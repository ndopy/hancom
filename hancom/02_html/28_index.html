<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시맨틱 구조</title>
  </head>
  <body>
    <h1>시맨틱 구조</h1>

    <!-- header : 맨 위 머리말 -->
    <header>
      <!-- nav : 메뉴 모음 = 네비게이션 -->
      <nav>홈 | 소개 | 연락처</nav>
    </header>

    <!-- main: 핵심 본문 -->
    <main>
      <!-- section : 하나의 주제 덩어리 -->
      <section>
        <!-- article : 완결된 글 하나 -->
        <article>첫 번째 글 내용</article>
      </section>
    </main>

    <!-- aside : 본문 옆 보조 내용 -->
    <aside>곁다리 정보 (사이드바)</aside>

    <figure>
      <img src="fruits.jpg" alt="과일" width="400" height="300" />
      <figcaption>그림 1. 과일</figcaption>
    </figure>

    <!-- footer : 맨 아래 꼬리말 -->
    <footer>©️ 2026 내 사이트</footer>
  </body>
</html>

<!-- 
  div는 뜻이 없는 빈 상자.
  시맨틱 태그는 이름만 봐도 어떤 구역인지 의미가 드러난다.
  핵심 : header, nav, main, section, article, aside, footer
-->
