<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>08-이미지</title>
    <style>
      img {
        width: 600px;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <!-- 이미지 찾는 사이트 : pexels.com/ko-kr/ -->
    <!-- img : 화면에 이미지를 넣을 때 사용한다. 닫는 태그가 없다. = 빈 태그 -->
    <!-- src : 사진 주소 -->
    <!-- alt : 사진이 보이지 않을 때, 대신 보여줄 글자 -->
    <img src="image.jpg" alt="예시 사진" />
  </body>
</html>
