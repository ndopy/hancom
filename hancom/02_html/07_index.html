    <title>07-강조,중첩</title>
  </head>
  <body>
    <!-- 태그 안에 태그 넣기 = 중첩(nesting) -->
    <!-- strong은 글자를 굵게 강조하는 태그 -->

    <!-- 엔티티 출력해보기 -->
    <p>저는 <strong>&lt;개발 &amp; 게임 &gt;</strong>하는 것을 좋아합니다.</p>
  </body>
</html>
