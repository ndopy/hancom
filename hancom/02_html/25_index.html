<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글자 꾸미기</title>
  </head>
  <body>
    <!-- em: 글자가 비스듬히 기울어짐 -->
    <p><em>기울임 강조</em></p>

    <!-- mark: 형광펜으로 칠한 느낌 -->
    <p><mark>형광펜</mark></p>

    <!-- small: 작게 쓰는 글씨 -->
    <p><small>작게 쓰는 글씨</small></p>

    <!-- code: 코드 -->
    <p><code>print('hi')</code></p>

    <!-- blockquote : 남의 말을 인용하는 칸 -->
    <blockquote>인용구</blockquote>

    <!-- sub : 아래첨자 (작게 아래로) -->
    <p>H<sub>2</sub>0</p>

    <!-- sup : 위첨자 (작게 위로)) -->
    <p>x<sup>2</sup></p>
  </body>
</html>
