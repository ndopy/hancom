<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>접는 상자</title>
  </head>
  <body>
    <!-- details : 클릭하면 펴고 접히는 상자 -->
    <details>
      <!-- summary : 항상 보이는 제목(클릭 버튼) -->
      <summary>정답 보기</summary>
      <!-- 펼쳐야 보이는 내용 -->
      <p>눌러야 보이는 영역</p>

      <button>버튼</button>

      <details>
        <summary>중첩된 버튼</summary>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo, animi
          aspernatur aperiam exercitationem natus optio fuga laborum molestias,
          maiores distinctio, officiis delectus non dignissimos. Quas iusto
          quisquam repudiandae eius itaque.
        </p>
      </details>
    </details>
  </body>
</html>
