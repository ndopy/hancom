<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <title>네온 그라디언트 카드</title>
  </head>
  <body>
    <div class="demo">
      <input type="radio" name="angle" id="a0" checked />
      <input type="radio" name="angle" id="a90" />
      <input type="radio" name="angle" id="a180" />
      <input type="radio" name="angle" id="a270" />

      <div class="bar"></div>
      <div class="preview">NEON</div>

      <label for="a0">0deg</label>
      <label for="a90">90deg</label>
      <label for="a180">180deg</label>
      <label for="a270">270deg</label>
    </div>
  </body>
</html>
