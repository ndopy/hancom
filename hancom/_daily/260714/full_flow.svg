<svg xmlns="http://www.w3.org/2000/svg" width="680" height="490" viewBox="0 0 680 490">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="680" height="490" fill="#f8fafc" rx="10"/>

  <!-- 구분선 -->
  <line x1="340" y1="56" x2="340" y2="480" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- 열 헤더 -->
  <rect x="40" y="14" width="220" height="34" rx="6" fill="#e2e8f0"/>
  <text x="150" y="36" text-anchor="middle" font-size="14" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#334155">클라이언트</text>

  <rect x="420" y="14" width="220" height="34" rx="6" fill="#e2e8f0"/>
  <text x="530" y="36" text-anchor="middle" font-size="14" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#334155">서버</text>

  <!-- ===== 요청 흐름 ===== -->

  <!-- 클라이언트: JS 객체 -->
  <rect x="40" y="58" width="220" height="46" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="78" text-anchor="middle" font-size="13" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#1d4ed8">JS 객체</text>
  <text x="150" y="96" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#1d4ed8">{ message: "안녕" }</text>

  <!-- 아래 화살표 + 레이블 -->
  <line x1="150" y1="104" x2="150" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="158" y="121" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#64748b">JSON.stringify()</text>

  <!-- 클라이언트: JSON 문자열 (발신) -->
  <rect x="40" y="133" width="220" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="152" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#1d4ed8">'{"message":"안녕"}'</text>
  <text x="150" y="168" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#3b82f6">JSON 문자열</text>

  <!-- 요청 화살표 (오른쪽) -->
  <line x1="260" y1="154" x2="420" y2="154" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="340" y="146" text-anchor="middle" font-size="10" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#94a3b8">HTTP 요청 전송</text>

  <!-- 서버: express.json() -->
  <rect x="420" y="126" width="220" height="76" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="530" y="150" text-anchor="middle" font-size="13" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#c2410c">express.json()</text>
  <text x="530" y="170" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#9a3412">JSON.parse() 호출</text>
  <text x="530" y="188" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#9a3412">→ req.body 에 저장</text>

  <!-- 서버 아래 화살표 -->
  <line x1="530" y1="202" x2="530" y2="234" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 서버: 라우트 핸들러 -->
  <rect x="420" y="237" width="220" height="66" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="530" y="260" text-anchor="middle" font-size="13" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#15803d">라우트 핸들러</text>
  <text x="530" y="279" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#166534">req.body 사용</text>
  <text x="530" y="295" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#166534">비즈니스 로직 처리</text>

  <!-- 서버 아래 화살표 -->
  <line x1="530" y1="303" x2="530" y2="336" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 서버: res.json() -->
  <rect x="420" y="339" width="220" height="70" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="530" y="362" text-anchor="middle" font-size="13" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#7e22ce">res.json({ reply })</text>
  <text x="530" y="381" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#6b21a8">JSON.stringify() 자동</text>
  <text x="530" y="398" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#6b21a8">Content-Type 헤더 자동 설정</text>

  <!-- ===== 응답 흐름 ===== -->

  <!-- 응답 화살표 (왼쪽) -->
  <line x1="420" y1="374" x2="260" y2="374" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="340" y="366" text-anchor="middle" font-size="10" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#94a3b8">HTTP 응답 수신</text>

  <!-- 클라이언트: response.json() -->
  <rect x="40" y="360" width="220" height="50" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="150" y="382" text-anchor="middle" font-size="13" font-weight="bold" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#7e22ce">response.json()</text>
  <text x="150" y="400" text-anchor="middle" font-size="11" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#6b21a8">JSON 문자열 → JS 객체</text>

  <!-- 클라이언트 아래 화살표 -->
  <line x1="150" y1="410" x2="150" y2="434" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 클라이언트: JS 객체 (수신) -->
  <rect x="40" y="437" width="220" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="457" text-anchor="middle" font-size="13" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#1d4ed8">JS 객체</text>
  <text x="150" y="472" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#1d4ed8">{ reply: "..." }</text>
</svg>
