<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>시간표</title>
    <style>
      table {
        border-collapse: collapse;
        text-align: center;
      }

      th,
      td {
        border: 1px solid black;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <h1>시간표</h1>
    <!-- table = 표 전체 상자, border="1"은 칸 선을 보이게 함 -->
    <table>
      <!-- tr = 가로 한 줄 -->
      <tr>
        <!-- th = 제목 칸(굵게, 가운데 정렬) -->
        <th>요일</th>
        <th>과목</th>
      </tr>
      <tr>
        <td>월</td>
        <td>국어</td>
      </tr>
      <tr>
        <td>화</td>
        <td>수학</td>
      </tr>
    </table>
  </body>
</html>
