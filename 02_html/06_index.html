<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>06-제목,문단</title>
  </head>
  <body>
    <!-- 제목은 크기 6단계(h1이 제일 크고 숫자가 커질수록 작아짐) -->
    <h1>제목</h1>
    <h2>제목</h2>
    <h3>제목</h3>
    <h4>제목</h4>
    <h5>제목</h5>
    <h6>제목</h6>

    <!-- 문단(글 한 덩어리) -->
    <p>저는 코딩을 처음 배우는 학생입니다.</p>
  </body>
</html>
