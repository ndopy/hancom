<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>입력칸 종류</title>
  </head>
  <body>
    <form action="">
      <label for="">
        이메일 :
        <input type="email" name="" id="" placeholder="abc@example.com" />
      </label>
      <br />

      <label for="">
        비밀번호 :
        <input type="password" name="" id="" placeholder="비밀번호 입력" />
      </label>
      <br />

      <label for=""> <input type="checkbox" name="" id="" /> 동의 </label>
      <br />

      <label for="">
        <input type="radio" name="gender" id="" /> 남
        <input type="radio" name="gender" id="" /> 여
      </label>
      <br />

      <input type="date" name="" id="" />
      <br />

      <textarea>긴 글 칸</textarea>
      <br />

      <select name="" id="">
        <option value="">서울</option>
        <option value="">부산</option>
        <option value="">제주</option>
      </select>
      <br />
    </form>
  </body>
</html>
