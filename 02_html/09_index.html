<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>09-링크</title>
    <style>
      a {
        text-decoration: none;
        color: #000;
      }
    </style>
  </head>
  <body>
    <!-- a : 누르면 다른 곳으로 가는 문 (링크) -->
    <!-- href : 이동할 주소 (https://까지 적어야 동작) -->
    <a
      href="https://www.google.com"
      title="구글로 이동하기"
      target="_blank"
      >구글</a
    >
    <a
      href="https://www.naver.com"
      title="네이버로 이동하기"
      target="_blank"
    >
      네이버
    </a>
  </body>
</html>
